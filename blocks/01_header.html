/* ════════════════════════════════════════════════════════════

.nav {
  position: sticky; top: 0; z-index: 1000;
  background: var(--brand-bg);
  border-bottom: 1px solid var(--brand-line);
  transition: box-shadow 0.25s var(--ease);
}
.nav--scrolled { box-shadow: 0 8px 32px rgba(26,26,26,0.10); }
.nav__inner {
  max-width: var(--maxw); margin: 0 auto;
  padding: 0 var(--pad-x);
  display: flex; align-items: center; gap: 32px;
  height: 76px;
}
.nav__logo { flex-shrink: 0; display: flex; align-items: center; }
.nav__logo img { height: 40px; width: auto; }
.nav__menu { display: flex; align-items: stretch; gap: 4px; margin: 0 auto; height: 100%; }
.nav__item {
  position: relative;
  display: inline-flex; align-items: center;
  padding: 0 18px; height: 100%;
  font-family: var(--font-head);
  font-size: 14.5px; font-weight: 500; letter-spacing: 0.01em;
  color: var(--brand-graphite);
  cursor: pointer; white-space: nowrap;
}
.nav__item::after {
  content: ''; position: absolute; left: 18px; right: 18px; bottom: -1px;
  height: 2px; background: var(--brand-red);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.22s var(--ease);
}
.nav__item:hover { color: var(--brand-red); }
.nav__item:hover::after, .nav__item.is-active::after { transform: scaleX(1); }
.nav__item.is-active { color: var(--brand-red); }
.nav__item-link { color: inherit; }
.nav__item-link:hover { color: inherit; }

/* Мегаменю */
.nav__dropdown {
  position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--brand-bg);
  border: 1px solid var(--brand-line);
  box-shadow: 0 24px 64px rgba(26,26,26,0.14);
  opacity: 0; visibility: hidden;
  transition: opacity 0.2s var(--ease), transform 0.2s var(--ease), visibility 0.2s;
  cursor: default;
}
.nav__item--has-menu:hover .nav__dropdown,
.nav__item--has-menu:focus-within .nav__dropdown {
  opacity: 1; visibility: visible;
  transform: translateX(-50%) translateY(0);
}
.nav__dropdown--catalog { width: 920px; max-width: calc(100vw - 48px); }
.nav__dropdown-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 24px; padding: 28px; }
.nav__dropdown-title {
  font-family: var(--font-head);
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand-text-muted);
  padding: 0 10px 10px; border-bottom: 1px solid var(--brand-line); margin-bottom: 8px;
}
.nav__dropdown-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 10px;
  font-size: 14px; font-weight: 400; color: var(--brand-graphite);
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
}
.nav__dropdown-item:hover { background: var(--brand-bg-soft); color: var(--brand-red); }
.nav__dropdown-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  border: 1px solid var(--brand-line);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; background: #fff;
}
.nav__dropdown-icon img { width: 100%; height: 100%; object-fit: cover; }
.nav__dropdown-icon--svg { color: var(--brand-graphite); padding: 8px; }
.nav__dropdown-icon--svg svg { width: 100%; height: 100%; }
.nav__dropdown-item:hover .nav__dropdown-icon--svg { color: var(--brand-red); }
.nav__dropdown-text { line-height: 1.3; }
.nav__dropdown-footer {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px;
  border-top: 1px solid var(--brand-line);
  font-family: var(--font-head);
  font-size: 14px; font-weight: 600; color: var(--brand-graphite);
  background: var(--brand-bg-soft);
  transition: color 0.15s var(--ease);
}
.nav__dropdown-footer:hover { color: var(--brand-red); }

.nav__right { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
.nav__max {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-head);
  font-size: 13px; font-weight: 600;
  color: var(--brand-graphite);
  padding: 7px 12px;
  border: 1px solid var(--brand-line-strong);
  transition: border-color 0.15s var(--ease), color 0.15s var(--ease);
}
.nav__max:hover { border-color: var(--brand-red); color: var(--brand-red); }
.nav__phone { font-family: var(--font-head); font-size: 15px; font-weight: 600; color: var(--brand-graphite); white-space: nowrap; }

@media (max-width: 1240px) {
  .nav__phone { display: none; }
  .nav__inner { gap: 16px; }
  .nav__logo img { height: 32px; }
  .nav__item { padding: 0 10px; font-size: 13.5px; }
  .nav__item::after { left: 10px; right: 10px; }
}
@media (max-width: 1020px) {
  .nav__max { display: none; }
  .nav__item { padding: 0 8px; font-size: 13px; }
  .nav__item::after { left: 8px; right: 8px; }
}

</style>
