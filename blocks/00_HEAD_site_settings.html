<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
/* MZ-V13 база: токены, типографика, утилиты */
/* ════════════════════════════════════════════════════════════
   МОСПРОМЗНАК — styles.css · v13 «Глобальный сайт-зонтик»
   ------------------------------------------------------------
   Секции самодостаточны: каждый блок стилей помечен баннером
   и не зависит от соседних — удобно переносить на Tilda.
   Палитра: красный #E5342A · графит #2B2B2B · белый.
   Шрифты: Golos Text (заголовки, UI) + PT Sans (текст).
   ════════════════════════════════════════════════════════════ */

/* ─────────────────────────── ТОКЕНЫ ─────────────────────────── */
:root {
  --brand-red: #E5342A;
  --brand-red-dark: #C42822;
  --brand-graphite: #2B2B2B;
  --brand-graphite-soft: #3A3A3A;
  --brand-bg: #FFFFFF;
  --brand-bg-soft: #F5F5F5;
  --brand-bg-dark: #1A1A1A;
  --brand-line: #E5E5E5;
  --brand-line-strong: #CFCFCF;
  --brand-text: #1A1A1A;
  --brand-text-muted: #6B6B6B;
  --brand-gray: #B8B8B8;
  --maxw: 1440px;
  --pad-x: 64px;
  --font-head: 'Golos Text', 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body: 'PT Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* ─────────────────────────── БАЗА ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
html, body {
  margin: 0; padding: 0;
  background: var(--brand-bg);
  color: var(--brand-text);
  font-family: var(--font-body);
  font-size: 17px; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
a:hover { color: var(--brand-red); }
button { font: inherit; cursor: pointer; border: none; background: none; }

h1, h2, h3, h4 {
  font-family: var(--font-head);
  color: var(--brand-graphite);
  margin: 0; font-weight: 600; letter-spacing: -0.01em;
}
h1 { font-size: 62px; line-height: 1.06; letter-spacing: -0.025em; font-weight: 700; }
h2 { font-size: 46px; line-height: 1.08; letter-spacing: -0.02em; }
h3 { font-size: 22px; line-height: 1.25; }
h4 { font-size: 16px; line-height: 1.3; font-weight: 600; }

.container { max-width: var(--maxw); margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }

.eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-head);
  font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--brand-text-muted);
}
.eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--brand-red); }
.eyebrow--red { color: var(--brand-red); }
.eyebrow--ondark { color: rgba(255,255,255,0.55); }

.lead { font-size: 19px; line-height: 1.55; color: var(--brand-graphite-soft); text-wrap: pretty; }

.section { padding: 112px 0; }
.section--soft { background: var(--brand-bg-soft); }
.section--dark { background: var(--brand-bg-dark); }
.section--dark h2, .section--dark h3 { color: #fff; }
.section__head {
  display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
  gap: 24px 80px; align-items: end; margin-bottom: 64px;
}
.section__head h2 { margin-top: 18px; }
@media (max-width: 960px) { .section__head { grid-template-columns: 1fr; } }

/* Кнопки */
.btn {
  display: inline-flex; align-items: center; gap: 12px;
  height: 54px; padding: 0 30px;
  font-family: var(--font-head);
  font-weight: 600; font-size: 15px; letter-spacing: 0.01em;
  border-radius: 0;
  transition: background 0.18s var(--ease), color 0.18s var(--ease), border-color 0.18s var(--ease), transform 0.18s var(--ease);
}
.btn .arr { transition: transform 0.18s var(--ease); }
.btn:hover .arr { transform: translateX(4px); }
.btn--primary { background: var(--brand-red); color: #fff; }
.btn--primary:hover { background: var(--brand-red-dark); color: #fff; }
.btn--ghost { background: transparent; color: var(--brand-graphite); border: 1.5px solid var(--brand-graphite); }
.btn--ghost:hover { background: var(--brand-graphite); color: #fff; }
.btn--ghost-light { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.45); }
.btn--ghost-light:hover { background: #fff; color: var(--brand-graphite); border-color: #fff; }
.btn--small { height: 42px; padding: 0 20px; font-size: 13.5px; }

/* Появление секций при скролле */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s var(--ease), transform 0.6s var(--ease); }
.reveal.is-visible { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
}

/* ─────────────────────── Адаптив общий ─────────────────────── */
@media (max-width: 1100px) {
  :root { --pad-x: 40px; }
  h1 { font-size: 46px; }
  h2 { font-size: 36px; }
  .section { padding: 80px 0; }
}
@media (max-width: 700px) {
  :root { --pad-x: 24px; }
  h1 { font-size: 36px; }
  h2 { font-size: 30px; }
  .nav__menu { display: none; }
  .slide__metrics { grid-template-columns: 1fr 1fr; }
  .dir-grid { grid-template-columns: 1fr; }
  .custom-cycle__grid2 { grid-template-columns: 1fr; }
}

</style>
<script>
/* MZ-V13: появление секций при скролле (.reveal) */
document.addEventListener('DOMContentLoaded',function(){
  var reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var reveals=document.querySelectorAll('.reveal');
  if(reduced||!('IntersectionObserver' in window)){reveals.forEach(function(el){el.classList.add('is-visible');});return;}
  var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('is-visible');io.unobserve(e.target);}});},{threshold:0.12});
  reveals.forEach(function(el){io.observe(el);});
});
</script>
